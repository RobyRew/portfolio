# nginx config for the static portfolio.
# nginx-unprivileged image runs as UID 101 and binds 8080.

server {
    listen       8080;
    server_name  _;
    server_tokens off;

    # ── Añade estas dos líneas aquí abajo ──────────────────────────────
    absolute_redirect off;
    port_in_redirect off;
    # ──────────────────────────────────────────────────────────────────
   
    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ────────────────────────────────────────────────
    # CSP: strict. Astro inlines critical CSS+JS; we allow inline-with-hashes
    # via 'self' + 'unsafe-inline' for stylesheets ONLY (Tailwind generates
    # inline <style> blocks). Scripts forbid inline entirely.
    add_header Content-Security-Policy
      "default-src 'self'; \
       script-src 'self'; \
       style-src 'self' 'unsafe-inline'; \
       img-src 'self' data:; \
       font-src 'self' data:; \
       connect-src 'self'; \
       frame-ancestors 'none'; \
       base-uri 'self'; \
       form-action 'self'; \
       upgrade-insecure-requests" always;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), midi=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-site" always;

    # ── Compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        application/atom+xml application/javascript application/json
        application/ld+json application/manifest+json application/rss+xml
        application/vnd.geo+json application/vnd.ms-fontobject
        application/x-font-ttf application/x-web-app-manifest+json
        application/xhtml+xml application/xml font/opentype
        image/bmp image/svg+xml image/x-icon text/cache-manifest
        text/css text/plain text/vcard text/vnd.rim.location.xloc
        text/vtt text/x-component text/x-cross-domain-policy;

    # ── Cache rules ─────────────────────────────────────────────────────
    # Hashed assets — long-lived
    location ~* ^/_astro/.*\.(js|css|woff2|woff|ttf|svg|png|jpg|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        access_log off;
    }

    # HTML — never cache; revalidate every visit
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # Service worker / manifest
    location = /sw.js          { expires -1; add_header Cache-Control "no-cache" always; }
    location = /manifest.webmanifest { expires 1d; }

    # Robots / sitemap — fast lookup, light cache
    location = /robots.txt     { expires 1d; access_log off; }
    location = /sitemap.xml    { expires 1d; }
    location = /sitemap-index.xml { expires 1d; }

    # ── Routing ─────────────────────────────────────────────────────────
    # Astro produces /en/index.html etc. Default the root to /en/.
    location = / {
        return 302 /en/;
    }

    location / {
        try_files $uri $uri/index.html $uri.html =404;
    }

    # ── Misc ────────────────────────────────────────────────────────────
    # Deny hidden / sensitive files
    location ~ /\.(?!well-known) { deny all; }
    location ~ /\.git            { deny all; }
}
