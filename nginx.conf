# nginx config for the static portfolio.
# nginx-unprivileged image runs as UID 101 and binds 8080.

server {
    listen       8080;
    server_name  _;
    server_tokens off;

    # Reverse proxy (Traefik) terminates TLS and rewrites URLs.
    # Tell nginx not to invent host/port in 30x redirects — let the proxy own that.
    absolute_redirect off;
    port_in_redirect off;

    root /usr/share/nginx/html;
    index index.html;

    # ── Content-Security-Policy ─────────────────────────────────────────
    # NOTE — `add_header` does NOT support `\` line continuations; they end
    # up in the literal header value and the browser sees a directive named
    # `\` and refuses everything. Build the value via `set` and concatenate.
    #
    # `'unsafe-inline'` for script-src is needed by:
    #   - the no-flash theme bootstrap inline <script> in BaseLayout.astro
    #   - Astro's tiny `is:inline` shims for client islands
    # Upgrade path: emit a hash for the theme script and switch to
    # `'strict-dynamic' 'nonce-<random>'` once we're comfortable with
    # nginx-level nonce injection (sub_filter at request time).
    #
    # `'unsafe-inline'` for style-src is needed because Astro 5 inlines
    # critical CSS as <style> blocks (build option `inlineStylesheets: 'auto'`).
    #
    # `data:` on font-src + img-src is needed because @fontsource-variable
    # ships small woff2 subsets as data URIs inlined into the bundle.
    set $csp_default "default-src 'self'";
    set $csp_script  "script-src 'self' 'unsafe-inline' https://stats.cosmincalin.es";
    set $csp_style   "style-src 'self' 'unsafe-inline'";
    set $csp_img     "img-src 'self' data: blob:";
    set $csp_font    "font-src 'self' data:";
    set $csp_connect "connect-src 'self' https://stats.cosmincalin.es";
    set $csp_manifest "manifest-src 'self'";
    set $csp_object  "object-src 'none'";
    set $csp_frame_a "frame-ancestors 'none'";
    set $csp_base    "base-uri 'self'";
    set $csp_form    "form-action 'self'";
    set $csp_misc    "upgrade-insecure-requests";
    set $csp "${csp_default}; ${csp_script}; ${csp_style}; ${csp_img}; ${csp_font}; ${csp_connect}; ${csp_manifest}; ${csp_object}; ${csp_frame_a}; ${csp_base}; ${csp_form}; ${csp_misc}";
    add_header Content-Security-Policy $csp always;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), midi=(), interest-cohort=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-site" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;

    # ── Compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        application/atom+xml application/javascript application/json
        application/ld+json application/manifest+json application/rss+xml
        application/vnd.geo+json application/vnd.ms-fontobject
        application/x-font-ttf application/x-web-app-manifest+json
        application/xhtml+xml application/xml font/opentype
        image/bmp image/svg+xml image/x-icon text/cache-manifest
        text/css text/plain text/vcard text/vnd.rim.location.xloc
        text/vtt text/x-component text/x-cross-domain-policy;

    # ── Cache rules ─────────────────────────────────────────────────────
    # Hashed assets — long-lived
    location ~* ^/_astro/.*\.(js|css|woff2|woff|ttf|svg|png|jpg|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        access_log off;
    }

    # HTML — never cache; revalidate every visit
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # Service worker / manifest
    location = /sw.js          { expires -1; add_header Cache-Control "no-cache" always; }
    location = /manifest.webmanifest { expires 1d; }

    # Robots / sitemap — fast lookup, light cache
    location = /robots.txt     { expires 1d; access_log off; }
    location = /sitemap.xml    { expires 1d; }
    location = /sitemap-index.xml { expires 1d; }

    # Legacy favicon — modern browsers use /favicon.svg from the <link>,
    # bots + RSS readers still try /favicon.ico. Redirect rather than 404.
    location = /favicon.ico {
        return 302 /favicon.svg;
        access_log off;
        log_not_found off;
    }

    # ── Routing ─────────────────────────────────────────────────────────
    # Astro produces /en/index.html etc. Default the root to /en/.
    location = / {
        return 302 /en/;
    }

    location / {
        try_files $uri $uri/index.html $uri.html =404;
    }

    # ── Misc ────────────────────────────────────────────────────────────
    # Deny hidden / sensitive files
    location ~ /\.(?!well-known) { deny all; }
    location ~ /\.git            { deny all; }
}
